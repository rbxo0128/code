name: Auto Blog Post (Algorithms)

on:
  push:
    branches:
      - main
    paths:
      - "백준/**"
      - "프로그래머스/**"
      - "리트코드/**"

permissions:
  contents: read

concurrency:
  group: auto-blog-post-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check requests

      - name: Detect newly added solution directories
        shell: bash
        run: |
          set -euo pipefail
          git config --global core.quotepath false

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "🔁 Diff range: $BEFORE → $AFTER"

          if [[ "$BEFORE" =~ ^0+$ ]]; then
            CHANGED_FILES="$(git diff-tree               --no-commit-id               --name-only               --diff-filter=A               -r "$AFTER")"
          else
            CHANGED_FILES="$(git diff               --name-only               --diff-filter=A               "$BEFORE" "$AFTER")"
          fi

          echo "📝 새로 추가된 파일:"
          printf '%s\n' "$CHANGED_FILES"

          : > problem_dirs.txt

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              백준/*|프로그래머스/*|리트코드/*)
                case "$file" in
                  *.py|*.java|*.cpp|*.cc|*.cxx|*.c|*.js|*.ts|*.kt|*.swift|*.go|*.rs|*.sql|*.rb|*.php|*.scala|*.sh)
                    dirname "$file" >> problem_dirs.txt
                    ;;
                esac
                ;;
            esac
          done <<< "$CHANGED_FILES"

          sort -u -o problem_dirs.txt problem_dirs.txt

          echo "📁 새 풀이가 추가된 문제 폴더:"
          cat problem_dirs.txt || true

      - name: Auto post new problems
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_PROXY: ${{ secrets.BLOG_PROXY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s problem_dirs.txt ]]; then
            echo "📭 새로 추가된 풀이가 없습니다."
            exit 0
          fi

          while IFS= read -r PROBLEM_PATH; do
            [[ -z "$PROBLEM_PATH" ]] && continue

            if [[ ! -f "$PROBLEM_PATH/README.md" ]]; then
              echo "❌ README.md가 없습니다: $PROBLEM_PATH"
              exit 1
            fi

            echo "🚀 자동 포스팅 시작: $PROBLEM_PATH"
            PROBLEM_PATH="$PROBLEM_PATH"               python .github/scripts/post_single_problem.py
          done < problem_dirs.txt
