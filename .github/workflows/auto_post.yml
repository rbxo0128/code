name: Auto Blog Post (Algorithms)

on:
  push:
    branches:
      - main
    paths:
      - "백준/**"
      - "프로그래머스/**"
      - "리트코드/**"

permissions:
  contents: read

concurrency:
  group: auto-blog-post-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check requests

      - name: Detect newly added problem directories
        shell: bash
        run: |
          set -euo pipefail
          git config --global core.quotepath false

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "🔁 Diff range: $BEFORE → $AFTER"

          if [[ "$BEFORE" =~ ^0+$ ]]; then
            git diff-tree --no-commit-id --name-only --diff-filter=A -r "$AFTER"
          else
            git diff --name-only --diff-filter=A "$BEFORE" "$AFTER"
          fi             | grep -E '^(백준|프로그래머스|리트코드)/.+/README\.md$'             | while IFS= read -r file; do dirname "$file"; done             | sort -u > problem_dirs.txt || true

          echo "📁 새로 추가된 문제 폴더:"
          cat problem_dirs.txt || true

      - name: Auto post new problems
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_PROXY: ${{ secrets.BLOG_PROXY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s problem_dirs.txt ]]; then
            echo "📭 새로 추가된 문제가 없습니다."
            exit 0
          fi

          while IFS= read -r PROBLEM_PATH; do
            [[ -z "$PROBLEM_PATH" ]] && continue
            echo "🚀 자동 포스팅 시작: $PROBLEM_PATH"
            PROBLEM_PATH="$PROBLEM_PATH" python .github/scripts/post_single_problem.py
          done < problem_dirs.txt
