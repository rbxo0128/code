name: Auto Blog Post (Algorithms)

on:
  push:
    branches:
      - main
    paths:
      - "백준/**"
      - "프로그래머스/**"
      - "리트코드/**"

permissions:
  contents: read

concurrency:
  group: auto-blog-post-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch