name: Auto Blog Post (Algorithms)

on:
  push:
    branches:
      - main
    paths:
      - "백준/**"
      - "프로그래머스/**"
      - "리트코드/**"

permissions:
  contents: read

concurrency:
  group: auto-blog-post-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check requests

      - name: Detect ready problem directories
        shell: bash
        run: |
          set -euo pipefail
          git config --global core.quotepath false

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "🔁 Diff range: $BEFORE → $AFTER"

          if [[ "$BEFORE" =~ ^0+$ ]]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only --diff-filter=AM -r "$AFTER")"
          else
            CHANGED_FILES="$(git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER")"
          fi

          echo "📝 추가 또는 변경된 파일:"
          printf '%s\n' "$CHANGED_FILES"

          : > problem_dirs.txt

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              백준/*/*/README.md|프로그래머스/*/*/README.md|리트코드/*/*/README.md)
                dirname "$file" >> problem_dirs.txt
                ;;
              백준/*/*|프로그래머스/*/*|리트코드/*/*)
                case "$file" in
                  *.py|*.java|*.cpp|*.cc|*.cxx|*.c|*.cs|*.js|*.ts|*.kt|*.swift|*.go|*.rs|*.sql|*.rb|*.php|*.scala|*.dart|*.sh|*.rkt|*.ex|*.erl|*.cj)
                    dirname "$file" >> problem_dirs.txt
                    ;;
                esac
                ;;
            esac
          done <<< "$CHANGED_FILES"

          sort -u -o problem_dirs.txt problem_dirs.txt

          echo "📁 변경이 감지된 문제 폴더:"
          cat problem_dirs.txt || true

      - name: Auto post ready problems
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_PROXY: ${{ secrets.BLOG_PROXY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s problem_dirs.txt ]]; then
            echo "📭 처리할 문제 폴더가 없습니다."
            exit 0
          fi

          READY_COUNT=0
          SKIPPED_COUNT=0

          while IFS= read -r PROBLEM_PATH; do
            [[ -z "$PROBLEM_PATH" ]] && continue

            if [[ ! -f "$PROBLEM_PATH/README.md" ]]; then
              echo "⏳ 문제 설명이 아직 없습니다. 다음 커밋에서 처리합니다: $PROBLEM_PATH"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            if ! find "$PROBLEM_PATH" -maxdepth 1 -type f \
              \( -name '*.py' -o -name '*.java' -o -name '*.cpp' -o -name '*.cc' \
                 -o -name '*.cxx' -o -name '*.c' -o -name '*.cs' -o -name '*.js' \
                 -o -name '*.ts' -o -name '*.kt' -o -name '*.swift' -o -name '*.go' \
                 -o -name '*.rs' -o -name '*.sql' -o -name '*.rb' -o -name '*.php' \
                 -o -name '*.scala' -o -name '*.dart' -o -name '*.sh' -o -name '*.rkt' \
                 -o -name '*.ex' -o -name '*.erl' -o -name '*.cj' \) \
              -print -quit | grep -q .; then
              echo "⏳ 풀이 코드가 아직 없습니다. 다음 커밋에서 처리합니다: $PROBLEM_PATH"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            echo "🚀 자동 포스팅 시작: $PROBLEM_PATH"
            PROBLEM_PATH="$PROBLEM_PATH" python .github/scripts/post_single_problem.py
            READY_COUNT=$((READY_COUNT + 1))
          done < problem_dirs.txt

          echo "✅ 처리 완료: $READY_COUNT개"
          echo "⏳ 준비되지 않아 건너뜀: $SKIPPED_COUNT개"
